# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

baseurl: ""
lang: en
prefer_datetime_locale:
timezone: Asia/Ho_Chi_Minh
# ↓ --------------------------

title: DanielPark
tagline: Penetration Testing, Bug Bounty Hunting, Security Research.
description: >-
  Penetration Testing, Bug Bounty Hunting, Security Research.

url: "https://khangdz296.github.io"

github:
  username: khangdz296

twitter:
  username:

social:
  name: Dương Đình Ngọc Khang
  email: duongdnkhang@gmail.com
  links:
    - https://github.com/khangdz296
    # - https://twitter.com/your_username
    # - https://www.linkedin.com/in/your_username

google_site_verification:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

google_analytics:
  id: ""

theme_mode: dark #

img_cdn:

avatar: https://github.com/khangdz296.png

toc: true
comments:
  active:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    input_position:
    lang:

assets:
  self_host:
    enabled:
    env:
paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
